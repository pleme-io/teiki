# teiki — scheduled task configuration
# Config: ~/.config/teiki/teiki.yaml
# Env override: TEIKI_CONFIG=/path/to/config.yaml
# Env prefix: TEIKI_ (e.g. TEIKI_DEFAULTS__TIMEOUT_SECS=7200)

defaults:
  low_priority: true
  timeout_secs: 3600
  platforms: [darwin, linux]

tasks:
  rust-cleanup:
    description: "Clean Rust target/ directories to reclaim disk space"
    command: seibi
    args: ["rust-cleanup", "--paths", "~/code"]
    schedule:
      type: calendar
      hour: 3
      minute: 0
    platforms: [darwin]
    tags: [cleanup, disk]

  docker-cleanup:
    description: "Prune unused Docker images, containers, and volumes"
    command: docker
    args: ["system", "prune", "-af", "--volumes"]
    schedule:
      type: calendar
      weekday: 7
      hour: 4
      minute: 0
    platforms: [darwin]
    tags: [cleanup, docker]

  attic-push:
    description: "Push Nix store to Attic binary cache"
    command: seibi
    args: ["attic-push", "--json"]
    schedule:
      type: interval
      seconds: 3600
    tags: [cache, nix]

  dns-refresh:
    description: "Flush macOS DNS cache to pick up topology changes"
    command: /usr/bin/dscacheutil
    args: ["-flushcache"]
    schedule:
      type: interval
      seconds: 3600
    platforms: [darwin]
    tags: [dns]
